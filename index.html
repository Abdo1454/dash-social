<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />

    <title>Social Media Dashboard</title>
</head>

<body>

    <main class="container">

        <div class="row">

            <div class="title">
                <h1>Social Media Dashboard</h1>
                <p class="total-followers">
                    Total Followers: 23,004
                </p>
            </div>

            <div class="switch-mode">
                <p>Dark Mode</p>

                <div class="switch">
                    <div class="toggle"></div>
                    <p class="switch-on"></p>
                </div>
            </div>

        </div>

        <div class="social-pages">

            <!-- Facebook -->
            <div class="card facebook">

                <div class="card-header">
                    <img src="images/icon-facebook.svg" alt="Facebook Icon" />
                    <p id="user-face">@nathanf</p>
                </div>

                <div class="card-body">
                    <h1 id="follower-face">1987</h1>
                    <p>Followers</p>
                </div>

                <div class="card-footer">
                    <img src="images/icon-up.svg" alt="Up Icon" />
                    <p>12 Today</p>
                </div>

            </div>

            <!-- Twitter -->
            <div class="card twitter">

                <div class="card-header">
                    <img src="images/icon-twitter.svg" alt="Twitter Icon" />
                    <p id="user-twitter">@nathanf</p>
                </div>

                <div class="card-body">
                    <h1 id="follower-twitter">1044</h1>
                    <p>Followers</p>
                </div>

                <div class="card-footer">
                    <img src="images/icon-up.svg" alt="Up Icon" />
                    <p>99 Today</p>
                </div>

            </div>

            <!-- Instagram -->
            <div class="card instagram">

                <div class="card-header">
                    <img src="images/icon-instagram.svg" alt="Instagram Icon" />
                    <p id="user-instagram">@realnathanf</p>
                </div>

                <div class="card-body">
                    <h1 id="follower-instagram">11k</h1>
                    <p>Followers</p>
                </div>

                <div class="card-footer">
                    <img src="images/icon-up.svg" alt="Up Icon" />
                    <p>1099 Today</p>
                </div>

            </div>

            <!-- YouTube -->
            <div class="card youtube">

                <div class="card-header">
                    <img src="images/icon-youtube.svg" alt="YouTube Icon" />
                    <p id="user-youtube">Nathan F.</p>
                </div>

                <div class="card-body">
                    <h1 id="follower-youtube">8239</h1>
                    <p>Subscribers</p>
                </div>

                <div class="card-footer">
                    <img src="images/icon-down.svg" alt="Down Icon" />
                    <p>144 Today</p>
                </div>

            </div>

        </div>

    </main>

    <script src="js/main.js"></script>

</body>
</html>
